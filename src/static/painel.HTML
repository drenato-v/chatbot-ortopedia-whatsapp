<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ortopedia Geral - Painel</title>
<style>
:root {
  --primary:       #1557a8;
  --primary-light: #e8f1fb;
  --green:         #15803d;
  --green-bg:      #dcfce7;
  --red:           #b91c1c;
  --red-bg:        #fee2e2;
  --yellow-bg:     #fef9c3;
  --yellow-text:   #854d0e;
  --blue-bg:       #dbeafe;
  --blue-text:     #1e40af;
  --gray-50:       #f8fafc;
  --gray-100:      #f1f5f9;
  --gray-200:      #e2e8f0;
  --gray-400:      #94a3b8;
  --gray-600:      #475569;
  --gray-800:      #1e293b;
  --radius:        8px;
  --shadow:        0 1px 4px rgba(0,0,0,.10);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--gray-100);
  color: var(--gray-800);
  min-height: 100vh;
}

/* ── Header ── */
header {
  background: var(--primary);
  color: #fff;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,.18);
}
header h1 { font-size: 1.15rem; font-weight: 600; }

/* ── Nav ── */
nav {
  background: #fff;
  border-bottom: 2px solid var(--gray-200);
  padding: 0 24px;
  display: flex;
}
nav button {
  padding: 13px 22px;
  border: none;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  background: none;
  cursor: pointer;
  font-size: .92rem;
  font-weight: 500;
  color: var(--gray-600);
  transition: color .15s;
}
nav button.active { color: var(--primary); border-bottom-color: var(--primary); }
nav button:hover:not(.active) { color: var(--gray-800); background: var(--gray-50); }

/* ── Main ── */
main { padding: 24px; max-width: 1080px; margin: 0 auto; }

/* ── Card ── */
.card {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px 20px;
  margin-bottom: 18px;
}

/* ── Controls ── */
.controls { display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap; }
.field { display: flex; flex-direction: column; gap: 5px; }
label { font-size: .78rem; font-weight: 600; color: var(--gray-600); text-transform: uppercase; letter-spacing: .4px; }
select, input[type="date"] {
  padding: 8px 11px;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius);
  font-size: .92rem;
  background: #fff;
  outline: none;
  cursor: pointer;
  min-width: 180px;
}
select:focus, input:focus { border-color: var(--primary); }

/* ── Buttons ── */
.btn {
  padding: 8px 18px;
  border-radius: var(--radius);
  border: none;
  cursor: pointer;
  font-size: .88rem;
  font-weight: 600;
  transition: opacity .15s, transform .1s;
}
.btn:active { transform: scale(.97); }
.btn:hover  { opacity: .85; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-success { background: var(--green);   color: #fff; }
.btn-danger  { background: var(--red);     color: #fff; }
.btn-sm { padding: 5px 11px; font-size: .8rem; }

/* ── Section title ── */
.section-title {
  font-size: .95rem;
  font-weight: 600;
  color: var(--gray-800);
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--gray-200);
}

/* ── Availability grid ── */
.grid-disp {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 10px;
  margin-top: 4px;
}
.slot {
  border-radius: var(--radius);
  border: 2px solid;
  padding: 14px 10px;
  text-align: center;
  cursor: pointer;
  user-select: none;
  transition: transform .12s, box-shadow .12s;
}
.slot:hover { transform: scale(1.04); box-shadow: 0 3px 10px rgba(0,0,0,.12); }
.slot.disponivel { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.slot.ocupado    { background: #fef3c7;          border-color: #d97706;      color: #92400e;      }
.slot.agendado   { background: var(--red-bg);   border-color: var(--red);   color: var(--red);   }
.slot .hora-txt  { font-size: 1.05rem; font-weight: 700; }
.slot .status-txt { font-size: .72rem; margin-top: 3px; opacity: .85; }
.slot .paciente-txt { font-size: .7rem; margin-top: 2px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.45); z-index: 1000;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: #fff; border-radius: var(--radius);
  padding: 24px; width: 420px; max-width: 94vw;
  box-shadow: 0 8px 32px rgba(0,0,0,.18);
}
.modal-box h2 { font-size: .98rem; color: var(--primary); margin-bottom: 18px; }
.form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.form-group label { font-size: .75rem; font-weight: 600; color: var(--gray-600); text-transform: uppercase; letter-spacing: .4px; }
.form-group input, .form-group select, .form-group textarea {
  padding: 8px 10px; border: 1.5px solid var(--gray-200); border-radius: var(--radius);
  font-size: .9rem; font-family: inherit; outline: none;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
.form-group textarea { resize: vertical; min-height: 70px; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
.detail-row { display: flex; flex-direction: column; gap: 3px; margin-bottom: 12px; }
.detail-row .lbl { font-size: .72rem; font-weight: 600; color: var(--gray-600); text-transform: uppercase; }
.detail-row .val { font-size: .9rem; color: var(--gray-800); }

/* ── Table ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: .88rem; }
th {
  text-align: left;
  padding: 9px 12px;
  background: var(--gray-50);
  color: var(--gray-600);
  font-size: .75rem;
  text-transform: uppercase;
  letter-spacing: .5px;
  border-bottom: 2px solid var(--gray-200);
}
td { padding: 11px 12px; border-bottom: 1px solid var(--gray-200); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--gray-50); }

/* ── Badges ── */
.badge {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 12px;
  font-size: .75rem;
  font-weight: 600;
}
.badge-pendente   { background: var(--yellow-bg); color: var(--yellow-text); }
.badge-confirmado { background: var(--green-bg);  color: var(--green); }
.badge-cancelado  { background: var(--red-bg);    color: var(--red); }
.badge-progresso  { background: var(--blue-bg);   color: var(--blue-text); }

/* ── Empty / loading ── */
.state-msg { text-align: center; padding: 40px 20px; color: var(--gray-400); }
.state-msg .icon { font-size: 2rem; margin-bottom: 8px; }
.state-msg .msg  { font-size: .9rem; }

.actions { display: flex; gap: 6px; }
</style>
</head>
<body>

<header>
  <h1>Ortopedia Geral</h1>
</header>

<nav>
  <button class="active" id="btn-tab-disp"  onclick="showTab('disp')"> Disponibilidade </button>
  <button id="btn-tab-pend" onclick="showTab('pend')"> Pendentes <span id="badge-pend" style="display:none;background:#dc2626;color:#fff;border-radius:10px;padding:1px 7px;font-size:.75rem;margin-left:4px">0</span></button>
  <button id="btn-tab-agend" onclick="showTab('agend')"> Agendamentos </button>
</nav>

<main>

  <!-- ── TAB DISPONIBILIDADE ── -->
  <div id="tab-disp">
    <div class="card">
      <div class="controls">
        <div class="field">
          <label for="sel-tecnico">Técnico</label>
          <select id="sel-tecnico" onchange="carregarAgenda()">
            <option value="">Selecione...</option>
          </select>
        </div>
        <div class="field">
          <label for="inp-data-disp">Data</label>
          <input type="date" id="inp-data-disp" onchange="carregarAgenda()">
        </div>
      </div>
    </div>

    <div class="card" id="card-agenda" style="display:none">
      <p class="section-title" id="titulo-agenda">Agenda</p>
      <div class="grid-disp" id="grid-agenda">
        <div class="state-msg"><div class="icon">⏳</div><div class="msg">Carregando...</div></div>
      </div>
    </div>
  </div>

  <!-- ── TAB PENDENTES ── -->
  <div id="tab-pend" style="display:none">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <p class="section-title" style="margin-bottom:0">Solicitações aguardando confirmação</p>
        <button class="btn btn-primary btn-sm" onclick="carregarPendentes()">↺ Atualizar</button>
      </div>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Horário</th>
              <th>Paciente</th>
              <th>WhatsApp</th>
              <th>Serviço</th>
              <th>Técnico</th>
              <th>Origem</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbody-pend">
            <tr><td colspan="8">
              <div class="state-msg">
                <div class="icon">⏳</div>
                <div class="msg">Carregando...</div>
              </div>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ── TAB AGENDAMENTOS ── -->
  <div id="tab-agend" style="display:none">
    <div class="card">
      <div class="controls">
        <div class="field">
          <label for="inp-data-agend">Data</label>
          <input type="date" id="inp-data-agend" onchange="carregarAgendamentos()">
        </div>
      </div>
    </div>

    <div class="card">
      <p class="section-title" id="titulo-agend">Agendamentos</p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Horário</th>
              <th>Paciente</th>
              <th>WhatsApp</th>
              <th>Serviço</th>
              <th>Técnico</th>
              <th>Origem</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbody-agend">
            <tr><td colspan="7">
              <div class="state-msg">
                <div class="icon">📋</div>
                <div class="msg">Selecione uma data para ver os agendamentos</div>
              </div>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</main>

<!-- ── Modal ── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <h2 id="modal-titulo"></h2>
    <div id="modal-corpo"></div>
    <div class="modal-footer">
      <button class="btn" style="background:var(--gray-200);color:var(--gray-600)" onclick="fecharModal()">Fechar</button>
      <button class="btn btn-primary" id="btn-modal-ok"     style="display:none" onclick="confirmarAgendamento()">Confirmar</button>
      <button class="btn btn-primary" id="btn-modal-edit"   style="display:none" onclick="abrirEdicao()">Editar</button>
      <button class="btn btn-primary" id="btn-modal-save"   style="display:none">Salvar</button>
      <button class="btn btn-danger"  id="btn-modal-remove" style="display:none" onclick="removerAgendamentoModal()">Remover</button>
    </div>
  </div>
</div>

<script>
// ── Utils ──────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);  // Atalho para getElementById

const hoje = () => new Date().toISOString().slice(0, 10);  // Data atual em YYYY-MM-DD

// Formata ISO date para "sexta-feira, 27/06/2026".
// T12:00:00 evita o bug de fuso horário que deslocaria o dia ao usar meia-noite UTC.
const fmtData = iso =>
  new Date(iso + 'T12:00:00').toLocaleDateString('pt-BR',
    { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' });

// Formata número bruto para "+55 (17) 99999-9999".
// Aceita tanto o número do WhatsApp (armazenado com DDI) quanto telefone informado pelo paciente.
const fmtFone = raw => {
  if (!raw) return '—';
  const d = String(raw).replace(/\D/g, '');  // Remove tudo que não for dígito
  if (d.length >= 12)                         // Número com DDI (≥ 12 dígitos): formata com código de país
    return `+${d.slice(0,2)} (${d.slice(2,4)}) ${d.slice(4,9)}-${d.slice(9)}`;
  return raw;  // Formato desconhecido: exibe como recebido
};

// Mapeia status de agendamento para classe CSS e label legível.
// Fallback: badge pendente com o valor bruto (evita tela em branco em status inesperado).
const badgeInfo = s => ({
  em_progresso: { cls: 'badge-progresso', label: 'Em andamento' },
  pendente:     { cls: 'badge-pendente',  label: 'Pendente' },
  confirmado:   { cls: 'badge-confirmado',label: 'Confirmado' },
  cancelado:    { cls: 'badge-cancelado', label: 'Cancelado' },
}[s] || { cls: 'badge-pendente', label: s });

// ── Tabs ───────────────────────────────────────────────────────────────────────
// Exibe a aba selecionada e oculta as demais. Recarrega dados ao trocar de aba.
function showTab(tab) {
  ['disp','pend','agend'].forEach(t => {
    $('tab-' + t).style.display = tab === t ? 'block' : 'none';
    $('btn-tab-' + t).classList.toggle('active', tab === t);
  });
  if (tab === 'pend')  carregarPendentes();     // Pendentes sempre frescos ao abrir a aba
  if (tab === 'agend') carregarAgendamentos();  // Agendamentos do dia selecionado ao abrir a aba
}

// ── Init ───────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  $('inp-data-disp').value  = hoje();   // Inicia seletor de data da agenda com hoje
  $('inp-data-agend').value = hoje();   // Inicia seletor de data dos agendamentos com hoje
  carregarTecnicos();       // Popula o select de técnicos
  carregarAgendamentos();   // Carrega agendamentos de hoje na aba Agendamentos
  carregarPendentes();      // Carrega pendentes imediatamente ao abrir o painel
  setInterval(carregarPendentes, 30000);  // Polling a cada 30s para não precisar refresh manual
});

// ── Technicians ────────────────────────────────────────────────────────────────
// Carrega todos os técnicos ativos e popula o select da aba Disponibilidade.
// Armazena em _todosTecnicos para reutilizar nos dropdowns de pendentes/edição
// sem fazer uma nova requisição a cada renderização.
async function carregarTecnicos() {
  try {
    const res  = await fetch('/painel/api/tecnicos');
    const data = await res.json();
    _todosTecnicos = data.tecnicos || [];  // Cache global para dropdowns de troca de técnico
    const sel  = $('sel-tecnico');
    sel.innerHTML = '<option value="">Selecione...</option>';
    _todosTecnicos.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.id;
      opt.textContent = `${t.nome} — ${t.setor}`;
      sel.appendChild(opt);
    });
  } catch (e) {
    console.error('Erro ao carregar técnicos:', e);
  }
}

// ── Availability ───────────────────────────────────────────────────────────────
// Lista de serviços oferecidos pela clínica — espelha os valores aceitos no banco.
const SETORES = ['Prótese','Palmilha','Tutor','Órteses','Órtese Individual','Cadeira de Rodas','Escaneamento 3D','Outras'];

let _modalCtx      = {};   // Contexto do modal aberto (agId, tid, data, hora, ag…)
let _todosTecnicos = [];   // Cache de todos os técnicos ativos (carregado uma vez no init)
let _agendamentos  = [];   // Lista atual da aba Agendamentos (usada por abrirEdicaoAgendamento)

// Busca e renderiza a agenda do técnico selecionado para a data selecionada.
async function carregarAgenda() {
  const tid  = $('sel-tecnico').value;
  const data = $('inp-data-disp').value;
  if (!tid || !data) return;  // Não carrega se técnico ou data ainda não estiverem selecionados

  $('card-agenda').style.display = 'block';
  const nome = $('sel-tecnico').selectedOptions[0].text;
  $('titulo-agenda').textContent = `${nome} — ${fmtData(data)}`;
  $('grid-agenda').innerHTML = '<div class="state-msg"><div class="icon">⏳</div><div class="msg">Carregando...</div></div>';

  try {
    const res    = await fetch(`/painel/api/disponibilidade?tecnico_id=${tid}&data=${data}`);
    const result = await res.json();
    renderAgenda(result.agenda, tid, data);
  } catch (e) {
    $('grid-agenda').innerHTML = '<div class="state-msg"><div class="icon">⚠️</div><div class="msg">Erro ao carregar agenda</div></div>';
  }
}

// Renderiza os slots da agenda como cartões clicáveis no grid.
// Cada slot tem um dos três estados:
//   disponivel → verde, clique abre formulário de novo agendamento
//   agendado   → azul, clique abre detalhes do agendamento existente
//   ocupado    → vermelho, bloqueio manual, clique oferece desbloqueio
function renderAgenda(agenda, tid, data) {
  const grid = $('grid-agenda');
  if (!agenda || agenda.length === 0) {
    grid.innerHTML = '<div class="state-msg"><div class="icon">📭</div><div class="msg">Nenhum horário disponível</div></div>';
    return;
  }
  grid.innerHTML = '';
  agenda.forEach(slot => {
    const hora    = slot.hora;
    const disp    = slot.disponivel;
    const ag      = slot.agendamento;
    const el      = document.createElement('div');
    const horaFmt = String(hora).padStart(2,'0') + ':00';

    if (disp) {
      // Slot livre: atendente pode criar um agendamento manual
      el.className = 'slot disponivel';
      el.innerHTML = `<div class="hora-txt">${horaFmt}</div><div class="status-txt">+ Agendar</div>`;
      el.onclick = () => abrirFormAgendamento(tid, data, hora);
    } else if (ag) {
      // Slot com agendamento: exibe nome e tipo do paciente
      el.className = 'slot agendado';
      const paciente = ag.nome_paciente || ag.cliente_nome || 'Paciente';
      el.innerHTML = `
        <div class="hora-txt">${horaFmt}</div>
        <div class="paciente-txt">${paciente}</div>
        <div class="status-txt">${ag.tipo_consulta || ''}</div>`;
      el.onclick = () => abrirDetalhesAgendamento(ag, tid, data, hora);
    } else {
      // Bloqueio manual sem agendamento: atendente pode desbloquear
      el.className = 'slot ocupado';
      el.innerHTML = `<div class="hora-txt">${horaFmt}</div><div class="status-txt">✗ Bloqueado</div>`;
      el.onclick = () => desbloquearSlot(tid, data, hora, el);
    }
    grid.appendChild(el);
  });
}

// ── Modal helpers ──────────────────────────────────────────────────────────────
// Abre o modal reutilizável com título, corpo HTML e visibilidade dos botões.
// btns: objeto com chaves ok/edit/save/remove indicando quais botões exibir.
function abrirModal(titulo, corpo, btns = {}) {
  $('modal-titulo').textContent = titulo;
  $('modal-corpo').innerHTML = corpo;
  $('btn-modal-ok').style.display     = btns.ok     ? 'inline-block' : 'none';
  $('btn-modal-edit').style.display   = btns.edit   ? 'inline-block' : 'none';
  $('btn-modal-save').style.display   = btns.save   ? 'inline-block' : 'none';
  $('btn-modal-remove').style.display = btns.remove ? 'inline-block' : 'none';
  $('modal-overlay').classList.add('open');
}

// Fecha o modal e limpa o contexto para evitar dados obsoletos em próxima abertura.
function fecharModal() { $('modal-overlay').classList.remove('open'); _modalCtx = {}; }

// ── Novo agendamento (slot livre) ──────────────────────────────────────────────
// Abre o formulário para criar um agendamento manual no slot livre clicado.
// Usa _todosTecnicos global para o select de segundo técnico (sem nova requisição).
async function abrirFormAgendamento(tid, data, hora) {
  _modalCtx = { tid, data, hora };
  const horaFmt = String(hora).padStart(2,'0') + ':00';
  const tecNome = $('sel-tecnico').selectedOptions[0]?.text || '';
  const opcoesSetor = SETORES.map(s => `<option value="${s}">${s}</option>`).join('');

  // Filtra o técnico principal do select de segundo técnico para evitar duplicação
  let opcoesTec2 = '<option value="">Nenhum</option>';
  try {
    const r = await fetch('/painel/api/tecnicos');
    const d = await r.json();
    opcoesTec2 += (d.tecnicos || [])
      .filter(t => t.id !== +tid)
      .map(t => `<option value="${t.id}">${t.nome} — ${t.setor}</option>`)
      .join('');
  } catch {}

  abrirModal(
    `Novo Agendamento — ${horaFmt} — ${tecNome}`,
    `<div class="form-group">
       <label>Nome do paciente *</label>
       <input id="f-nome" type="text" placeholder="Nome completo" required>
     </div>
     <div class="form-group">
       <label>Serviço *</label>
       <select id="f-setor"><option value="">Selecione...</option>${opcoesSetor}</select>
     </div>
     <div class="form-group">
       <label>Segundo técnico (opcional)</label>
       <select id="f-tec2">${opcoesTec2}</select>
     </div>
     <div class="form-group">
       <label>Observações</label>
       <textarea id="f-obs" placeholder="Informações adicionais..."></textarea>
     </div>`,
    { ok: true }
  );
}

// Salva o agendamento manual criado pela atendente (origem='manual', status='confirmado').
// Após salvar, atualiza tanto a grade da agenda quanto a lista de agendamentos.
async function confirmarAgendamento() {
  const nome  = document.getElementById('f-nome')?.value.trim();
  const setor = document.getElementById('f-setor')?.value;
  const obs   = document.getElementById('f-obs')?.value.trim();
  const tec2  = document.getElementById('f-tec2')?.value;
  if (!nome)  { alert('Informe o nome do paciente.'); return; }
  if (!setor) { alert('Selecione o serviço.'); return; }
  const { tid, data, hora } = _modalCtx;
  try {
    const res = await fetch('/painel/api/agendamentos/manual', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tecnico_id: +tid, data, hora: +hora,
                             tipo_consulta: setor, nome_paciente: nome,
                             observacoes: obs || null,
                             tecnico_id_2: tec2 ? +tec2 : null })
    });
    if (!res.ok) throw new Error();
    fecharModal();
    carregarAgenda();          // Atualiza grade para refletir slot ocupado
    carregarAgendamentos();    // Atualiza aba Agendamentos com o novo registro
  } catch { alert('Erro ao salvar agendamento. Tente novamente.'); }
}

// ── Detalhes do agendamento (slot ocupado com agendamento) ─────────────────────
// Exibe modal somente-leitura com os dados do agendamento existente.
// Armazena contexto completo em _modalCtx para que editar/remover funcionem sem re-buscar.
function abrirDetalhesAgendamento(ag, tid, data, hora) {
  _modalCtx = { agId: ag.id, tid, data, hora, tec2Id: ag.tecnico_id_2 || null, ag };
  const origem = ag.origem === 'whatsapp'
    ? '<span class="badge badge-progresso">WhatsApp</span>'
    : '<span class="badge badge-confirmado">Manual</span>';
  const paciente = ag.nome_paciente || ag.cliente_nome || '—';
  // Exibe WhatsApp somente se disponível (agendamentos manuais não têm)
  const fone  = ag.numero_whatsapp ? `<div class="detail-row"><div class="lbl">WhatsApp</div><div class="val">${fmtFone(ag.numero_whatsapp)}</div></div>` : '';
  const obs   = ag.observacoes ? `<div class="detail-row"><div class="lbl">Observações</div><div class="val">${ag.observacoes}</div></div>` : '';
  const tec2  = ag.tecnico_nome_2 ? `<div class="detail-row"><div class="lbl">2º Técnico</div><div class="val">${ag.tecnico_nome_2}</div></div>` : '';
  abrirModal(
    `Agendamento — ${String(hora).padStart(2,'0')}:00`,
    `<div class="detail-row"><div class="lbl">Origem</div><div class="val">${origem}</div></div>
     <div class="detail-row"><div class="lbl">Paciente</div><div class="val">${paciente}</div></div>
     <div class="detail-row"><div class="lbl">Serviço</div><div class="val">${ag.tipo_consulta || '—'}</div></div>
     ${tec2}${fone}${obs}`,
    { edit: true, remove: true }
  );
}

// Remove o agendamento aberto no modal e libera os slots dos técnicos envolvidos.
// Libera técnico principal e, se existir, o segundo técnico.
async function removerAgendamentoModal() {
  if (!confirm('Deseja remover este agendamento? O horário ficará disponível novamente.')) return;
  const { agId, tid, data, hora, tec2Id } = _modalCtx;
  const liberar = (tecnico_id) => fetch('/painel/api/disponibilidade/liberar', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ tecnico_id, data, hora: +hora })
  });
  try {
    await fetch(`/painel/api/agendamentos/${agId}/cancelar`, { method: 'POST' });
    await liberar(+tid);
    if (tec2Id) await liberar(+tec2Id);  // Libera segundo técnico se houver
    fecharModal();
    carregarAgenda();
    carregarAgendamentos();
  } catch { alert('Erro ao remover. Tente novamente.'); }
}

// Substitui o corpo do modal de detalhes por um formulário de edição (aba Disponibilidade).
// btn-modal-save recebe onclick=salvarEdicao dinamicamente para não conflitar com
// salvarEdicaoAgendamento usado na aba Agendamentos — ambas usam o mesmo botão.
async function abrirEdicao() {
  const { agId, tid, data, hora, tec2Id } = _modalCtx;
  const ag = _modalCtx.ag;
  const opcoesSetor = SETORES.map(s =>
    `<option value="${s}" ${ag.tipo_consulta === s ? 'selected' : ''}>${s}</option>`
  ).join('');

  // Filtra técnico principal do select de segundo técnico; pré-seleciona o atual
  let opcoesTec2 = '<option value="">Nenhum</option>';
  try {
    const r = await fetch('/painel/api/tecnicos');
    const d = await r.json();
    opcoesTec2 += (d.tecnicos || [])
      .filter(t => t.id !== +tid)
      .map(t => `<option value="${t.id}" ${t.id === tec2Id ? 'selected' : ''}>${t.nome} — ${t.setor}</option>`)
      .join('');
  } catch {}

  $('modal-corpo').innerHTML = `
    <div class="form-group">
      <label>Nome do paciente *</label>
      <input id="e-nome" type="text" value="${ag.nome_paciente || ag.cliente_nome || ''}">
    </div>
    <div class="form-group">
      <label>Serviço *</label>
      <select id="e-setor"><option value="">Selecione...</option>${opcoesSetor}</select>
    </div>
    <div class="form-group">
      <label>Segundo técnico</label>
      <select id="e-tec2">${opcoesTec2}</select>
    </div>
    <div class="form-group">
      <label>Observações</label>
      <textarea id="e-obs">${ag.observacoes || ''}</textarea>
    </div>`;
  $('btn-modal-edit').style.display  = 'none';
  $('btn-modal-save').style.display  = 'inline-block';
  $('btn-modal-save').onclick        = salvarEdicao;  // Vincula handler correto para este contexto
}

// Envia edição do agendamento aberto na grade (aba Disponibilidade).
// Gerencia troca de segundo técnico via tecnico_id_2_old/new para o backend
// liberar o slot antigo e ocupar o novo.
async function salvarEdicao() {
  const nome  = document.getElementById('e-nome')?.value.trim();
  const setor = document.getElementById('e-setor')?.value;
  const tec2  = document.getElementById('e-tec2')?.value;
  const obs   = document.getElementById('e-obs')?.value.trim();
  if (!nome)  { alert('Informe o nome do paciente.'); return; }
  if (!setor) { alert('Selecione o serviço.'); return; }
  const { agId, data, hora, tec2Id } = _modalCtx;
  try {
    const res = await fetch(`/painel/api/agendamentos/${agId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nome_paciente: nome, tipo_consulta: setor,
        observacoes: obs || null,
        tecnico_id_2_old: tec2Id || null,           // Técnico secundário antes da edição
        tecnico_id_2_new: tec2 ? +tec2 : null,      // Técnico secundário após a edição
        data, hora: +hora
      })
    });
    if (!res.ok) throw new Error();
    fecharModal();
    carregarAgenda();
    carregarAgendamentos();
  } catch { alert('Erro ao salvar. Tente novamente.'); }
}

// ── Edição de agendamento (aba Agendamentos) ───────────────────────────────────
// Abre o modal de edição a partir da aba Agendamentos, permitindo alterar:
// nome, telefone, serviço, horário e técnico principal.
// Usa _agendamentos (cache da última renderização) para evitar nova requisição.
function abrirEdicaoAgendamento(id) {
  const a = _agendamentos.find(x => x.id === id);
  if (!a) return;
  const data    = a.data_agendamento ? a.data_agendamento.split('T')[0].substring(0, 10) : '';
  const horaInt = a.horario ? parseInt(a.horario.split(':')[0], 10) : null;
  // Armazena IDs antigos de técnicos para que o backend possa liberar slots corretos ao salvar
  _modalCtx = { agId: a.id, data, hora: horaInt, tecId: a.tecnico_id || null, tec2Id: a.tecnico_id_2 || null, ag: a };

  const opcoesSetor = SETORES.map(s =>
    `<option value="${s}" ${a.tipo_consulta === s ? 'selected' : ''}>${s}</option>`
  ).join('');
  // _todosTecnicos já carregado no init: evita requisição extra ao abrir o modal
  const opcoesTec = _todosTecnicos.map(t =>
    `<option value="${t.id}" ${t.id === a.tecnico_id ? 'selected' : ''}>${t.nome} — ${t.setor}</option>`
  ).join('');

  $('modal-titulo').textContent = 'Editar Agendamento';
  $('modal-corpo').innerHTML = `
    <div class="form-group">
      <label>Nome do paciente *</label>
      <input id="ea-nome" type="text" value="${(a.nome_paciente || a.cliente_nome || '').replace(/"/g,'&quot;')}">
    </div>
    <div class="form-group">
      <label>Telefone</label>
      <input id="ea-tel" type="tel" value="${a.telefone_paciente || ''}">
    </div>
    <div class="form-group">
      <label>Serviço *</label>
      <select id="ea-setor"><option value="">Selecione...</option>${opcoesSetor}</select>
    </div>
    <div class="form-group">
      <label>Horário</label>
      <input id="ea-horario" type="time" value="${a.horario || ''}">
    </div>
    <div class="form-group">
      <label>Técnico</label>
      <select id="ea-tecnico"><option value="">— sem técnico —</option>${opcoesTec}</select>
    </div>
    <div class="form-group">
      <label>Observações</label>
      <textarea id="ea-obs">${a.observacoes || ''}</textarea>
    </div>`;
  $('btn-modal-ok').style.display     = 'none';
  $('btn-modal-edit').style.display   = 'none';
  $('btn-modal-save').style.display   = 'inline-block';
  $('btn-modal-save').onclick         = salvarEdicaoAgendamento;  // Handler específico desta aba
  $('btn-modal-remove').style.display = 'none';
  $('modal-overlay').classList.add('open');
}

// Salva as alterações do agendamento editado na aba Agendamentos.
// Envia tecnico_id_old/new e horario_new para que o backend gerencie
// automaticamente a liberação e ocupação dos slots corretos.
async function salvarEdicaoAgendamento() {
  const nome    = document.getElementById('ea-nome')?.value.trim();
  const tel     = document.getElementById('ea-tel')?.value.trim();
  const setor   = document.getElementById('ea-setor')?.value;
  const horario = document.getElementById('ea-horario')?.value;
  const tecId   = document.getElementById('ea-tecnico')?.value;
  const obs     = document.getElementById('ea-obs')?.value.trim();
  if (!nome)  { alert('Informe o nome do paciente.'); return; }
  if (!setor) { alert('Selecione o serviço.'); return; }
  const { agId, data, hora, tecId: oldTecId, tec2Id } = _modalCtx;
  try {
    const res = await fetch(`/painel/api/agendamentos/${agId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nome_paciente:     nome,
        tipo_consulta:     setor,
        telefone_paciente: tel  || null,
        horario_new:       horario || null,          // Novo horário; null = mantém o atual
        observacoes:       obs  || null,
        tecnico_id_old:    oldTecId  || null,        // Técnico principal antes da edição
        tecnico_id_new:    tecId ? +tecId : null,    // Técnico principal após a edição
        tecnico_id_2_old:  tec2Id || null,           // Segundo técnico (mantido igual aqui)
        tecnico_id_2_new:  tec2Id || null,
        data,
        hora: hora || 0
      })
    });
    if (!res.ok) throw new Error();
    fecharModal();
    carregarAgendamentos();  // Atualiza lista principal
    carregarAgenda();        // Atualiza grade se a aba Disponibilidade estiver visível
  } catch { alert('Erro ao salvar. Tente novamente.'); }
}

// ── Slot bloqueado sem agendamento ─────────────────────────────────────────────
// Alterna um slot de bloqueado para disponível ao clicar no cartão vermelho.
// Desativa o elemento visualmente durante a requisição para dar feedback imediato
// e evitar cliques duplos; restaura em caso de erro.
async function desbloquearSlot(tid, data, hora, el) {
  el.style.opacity = '.45';
  el.style.pointerEvents = 'none';
  try {
    await fetch('/painel/api/disponibilidade/toggle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tecnico_id: +tid, data, hora: +hora })
    });
    carregarAgenda();  // Recarrega a grade para refletir o novo estado do slot
  } catch { el.style.opacity = '1'; el.style.pointerEvents = 'auto'; }  // Restaura em caso de falha
}

// ── Pending appointments ───────────────────────────────────────────────────────
// Busca solicitações pendentes (de qualquer data) e atualiza o badge no cabeçalho da aba.
// Chamado no init e a cada 30s (polling) para manter o contador sempre atualizado.
async function carregarPendentes() {
  const tbody = $('tbody-pend');
  try {
    const res    = await fetch('/painel/api/agendamentos/pendentes');
    const result = await res.json();
    const lista  = result.agendamentos || [];
    // Badge com contador: visível somente quando há pendentes
    const badge = $('badge-pend');
    if (lista.length > 0) {
      badge.textContent = lista.length;
      badge.style.display = 'inline';
    } else {
      badge.style.display = 'none';  // Oculta badge quando não há pendentes
    }
    renderPendentes(lista, tbody);
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="8"><div class="state-msg"><div class="icon">⚠️</div><div class="msg">Erro ao carregar pendentes</div></div></td></tr>';
  }
}

// Renderiza a tabela de pendentes.
// Inclui um select de técnico por linha para que a atendente possa trocar o técnico
// antes de confirmar — o ID selecionado é lido em confirmarPendente().
function renderPendentes(lista, tbody) {
  if (!lista.length) {
    tbody.innerHTML = '<tr><td colspan="8"><div class="state-msg"><div class="icon">✅</div><div class="msg">Nenhuma solicitação pendente</div></div></td></tr>';
    return;
  }
  tbody.innerHTML = lista.map(a => {
    const dataIso  = a.data_agendamento ? a.data_agendamento.split('T')[0].substring(0,10) : '';
    const dataFmt  = dataIso ? fmtData(dataIso) : '—';
    // Usa horario armazenado; fallback para hora extraída de data_agendamento
    const horario  = a.horario || (a.data_agendamento
      ? new Date(a.data_agendamento).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
      : '—');
    const origemBadge = a.origem === 'whatsapp'
      ? '<span class="badge badge-progresso">WhatsApp</span>'
      : '<span class="badge badge-confirmado">Manual</span>';
    const horaInt = a.horario ? parseInt(a.horario.split(':')[0], 10) : null;
    return `
      <tr>
        <td>${dataFmt}</td>
        <td><strong>${horario}</strong></td>
        <td>${a.cliente_nome || '—'}</td>
        <td>${fmtFone(a.telefone_paciente || a.numero_whatsapp)}</td>
        <td>${a.tipo_consulta || '—'}</td>
        <td>
          <!-- Select de técnico: pré-selecionado com o técnico original; atendente pode trocar antes de confirmar -->
          <select id="tec-pend-${a.id}" class="form-select form-select-sm" style="min-width:140px">
            <option value="">— sem técnico —</option>
            ${_todosTecnicos.map(t => `<option value="${t.id}"${t.id === a.tecnico_id ? ' selected' : ''}>${t.nome}</option>`).join('')}
          </select>
        </td>
        <td>${origemBadge}</td>
        <td>
          <div class="actions">
            <button class="btn btn-success btn-sm" onclick="confirmarPendente(${a.id})">✓ Confirmar</button>
            <button class="btn btn-danger  btn-sm" onclick="recusarPendente(${a.id},${a.tecnico_id||'null'},${a.tecnico_id_2||'null'},'${dataIso}',${horaInt})">✕ Recusar</button>
          </div>
        </td>
      </tr>`;
  }).join('');
}

// Confirma o agendamento e notifica o cliente via WhatsApp.
// Lê o select de técnico da linha para enviar um possível tecnico_id alternativo.
// O backend libera o slot do técnico antigo e ocupa o do novo se houver troca.
async function confirmarPendente(id) {
  if (!confirm('Confirmar este agendamento? O cliente será notificado pelo WhatsApp.')) return;
  const sel = document.getElementById(`tec-pend-${id}`);
  const tecnico_id = sel ? (sel.value ? parseInt(sel.value, 10) : null) : null;
  try {
    await fetch(`/painel/api/agendamentos/${id}/confirmar`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tecnico_id })  // null = mantém o técnico original
    });
    carregarPendentes();      // Remove da lista de pendentes
    carregarAgendamentos();   // Aparece na aba Agendamentos como confirmado
  } catch { alert('Erro ao confirmar. Tente novamente.'); }
}

// Recusa o agendamento e libera os slots bloqueados dos técnicos envolvidos.
// Técnico_id e tecnico_id_2 são passados como args inline para evitar nova busca;
// horaInt é passado como inteiro pois a API de disponibilidade espera número inteiro.
async function recusarPendente(id, tecnico_id, tecnico_id_2, data, horaInt) {
  if (!confirm('Recusar esta solicitação? O cliente será notificado pelo WhatsApp.')) return;
  const liberar = (tid) => fetch('/painel/api/disponibilidade/liberar', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ tecnico_id: tid, data, hora: horaInt })
  });
  try {
    await fetch(`/painel/api/agendamentos/${id}/cancelar`, { method: 'POST' });
    if (tecnico_id)   await liberar(tecnico_id);    // Libera slot do técnico principal
    if (tecnico_id_2) await liberar(tecnico_id_2);  // Libera slot do segundo técnico, se houver
    carregarPendentes();
    carregarAgendamentos();
  } catch { alert('Erro ao recusar. Tente novamente.'); }
}

// ── Appointments ───────────────────────────────────────────────────────────────
async function carregarAgendamentos() {
  const data = $('inp-data-agend').value;
  if (!data) return;
  $('titulo-agend').textContent = `Agendamentos — ${fmtData(data)}`;
  const tbody = $('tbody-agend');
  tbody.innerHTML = '<tr><td colspan="7"><div class="state-msg"><div class="icon">⏳</div><div class="msg">Carregando...</div></div></td></tr>';

  try {
    const res    = await fetch(`/painel/api/agendamentos?data=${data}`);
    const result = await res.json();
    renderAgendamentos(result.agendamentos || []);
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="7"><div class="state-msg"><div class="icon">⚠️</div><div class="msg">Erro ao carregar agendamentos</div></div></td></tr>';
  }
}

function renderAgendamentos(lista) {
  _agendamentos = lista;
  const tbody = $('tbody-agend');
  if (!lista.length) {
    tbody.innerHTML = '<tr><td colspan="7"><div class="state-msg"><div class="icon">📭</div><div class="msg">Nenhum agendamento nesta data</div></div></td></tr>';
    return;
  }
  tbody.innerHTML = lista.map(a => {
    let horario = '—';
    if (a.horario) {
      horario = a.horario;
    } else if (a.data_agendamento) {
      const d = new Date(a.data_agendamento);
      if (!isNaN(d)) horario = d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }
    const b = badgeInfo(a.status);
    const pendente = a.status === 'pendente';
    const origemBadge = a.origem === 'whatsapp'
      ? '<span class="badge badge-progresso">WhatsApp</span>'
      : '<span class="badge badge-confirmado">Manual</span>';
    const obs = a.observacoes ? `<br><small style="color:var(--gray-400)">${a.observacoes}</small>` : '';
    const dataAgend = a.data_agendamento ? a.data_agendamento.split('T')[0].substring(0,10) : '';
    const horaInt   = a.horario ? parseInt(a.horario.split(':')[0], 10) : null;
    const removerArgs = `${a.id},${a.tecnico_id || 'null'},${a.tecnico_id_2 || 'null'},'${dataAgend}',${horaInt}`;
    return `
      <tr>
        <td><strong>${horario}</strong></td>
        <td>${a.cliente_nome || '—'}${obs}</td>
        <td>${fmtFone(a.telefone_paciente || a.numero_whatsapp)}</td>
        <td>${a.tipo_consulta || '—'}</td>
        <td>${a.tecnico_nome || '—'}${a.tecnico_nome_2 ? `<br><small style="color:var(--gray-400)">+ ${a.tecnico_nome_2}</small>` : ''}</td>
        <td>${origemBadge}</td>
        <td><span class="badge ${b.cls}">${b.label}</span></td>
        <td>
          <div class="actions">
          ${pendente ? `<button class="btn btn-success btn-sm" onclick="atualizarStatus(${a.id},'confirmar')">✓ Confirmar</button>` : ''}
          <button class="btn btn-primary btn-sm" onclick="abrirEdicaoAgendamento(${a.id})">✎ Editar</button>
          <button class="btn btn-danger btn-sm" onclick="removerDaLista(${removerArgs})">✕ Remover</button>
          </div>
        </td>
      </tr>`;
  }).join('');
}

async function atualizarStatus(id, acao) {
  if (!confirm(`Deseja ${acao === 'confirmar' ? 'confirmar' : 'cancelar'} este agendamento?`)) return;
  try {
    await fetch(`/painel/api/agendamentos/${id}/${acao}`, { method: 'POST' });
    carregarAgendamentos();
  } catch (e) {
    alert('Erro ao atualizar status. Tente novamente.');
  }
}

async function removerDaLista(id, tecnico_id, tecnico_id_2, data, horaInt) {
  if (!confirm('Remover este agendamento da lista?')) return;
  const liberar = (tid) => fetch('/painel/api/disponibilidade/liberar', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ tecnico_id: tid, data, hora: horaInt })
  });
  try {
    await fetch(`/painel/api/agendamentos/${id}/cancelar`, { method: 'POST' });
    if (tecnico_id)   await liberar(tecnico_id);
    if (tecnico_id_2) await liberar(tecnico_id_2);
    carregarAgendamentos();
    carregarAgenda();
  } catch { alert('Erro ao remover. Tente novamente.'); }
}
</script>
</body>
</html>
